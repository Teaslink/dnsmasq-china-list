name: Sync upstream domain files

on:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6

      - name: Download upstream domain files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for file in accelerated-domains.china.conf apple.china.conf google.china.conf; do
            curl -fsSL "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/${file}" -o "${file}"
          done

      - name: Commit changes
        run: |
          if git diff --quiet -- accelerated-domains.china.conf apple.china.conf google.china.conf; then
            echo "No upstream changes."
            exit 0
          fi
          git add accelerated-domains.china.conf apple.china.conf google.china.conf
          git commit -m "同步 dnsmasq 上游域名文件"
          git push origin HEAD:master
